version: '3.9'

services:

  postgres:
    image: postgres:16
    container_name: postgres-container

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cloudmart

    ports:
      - "5433:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: backend-container

    ports:
      - "8000:8000"

    depends_on:
      - postgres

volumes:
  postgres-data:
